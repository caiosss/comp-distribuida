events {
    worker_connections 1024;
}

http {
    # O resolver 127.0.0.11 é o DNS interno do Docker.
    # valid=5s força re-resolução periódica, essencial para que o nginx
    # descubra dinamicamente as instâncias criadas via --scale.
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;

        location / {
            # A variável $upstream_wordpress força o nginx a resolver o nome
            # via DNS em runtime (e não apenas no startup). Sem isso, o nginx
            # cachearia o endereço na inicialização e ignoraria réplicas novas.
            set $upstream_wordpress wordpress;

            proxy_pass         http://$upstream_wordpress;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;

            # Header de debug: revela qual instância backend respondeu.
            # Útil para verificar que o balanceamento está funcionando.
            add_header X-Upstream $upstream_addr always;
        }
    }
}